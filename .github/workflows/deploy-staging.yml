name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL_STAGING || 'http://staging-api.akurima.com.br' }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Deploy to S3
        run: |
          aws s3 sync ./out "s3://${{ secrets.STAGING_S3_BUCKET }}" --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.STAGING_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text

      - name: Health check
        run: |
          sleep 5
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.STAGING_CLOUDFRONT_URL }}" 2>/dev/null || echo "000")
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "Health check passed (HTTP $HTTP_STATUS)"
          else
            echo "Health check FAILED (HTTP $HTTP_STATUS)"
            exit 1
          fi

      - name: Notify status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            {
              echo "## Deploy Staging OK"
              echo ""
              echo "Branch: \`develop\`"
              echo "Commit: ${{ github.sha }}"
              echo "URL: ${{ secrets.STAGING_CLOUDFRONT_URL }}"
            } >> $GITHUB_STEP_SUMMARY
          else
            {
              echo "## Deploy Staging FAILED"
              echo ""
              echo "Branch: \`develop\`"
              echo "Commit: ${{ github.sha }}"
            } >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
