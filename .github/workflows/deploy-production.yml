name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do deploy'
        required: true
        default: 'Deploy manual para produção'

env:
  NODE_VERSION: '20'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL_PRODUCTION || 'https://api.akurima.com.br' }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Deploy to S3
        run: |
          aws s3 sync ./out "s3://${{ secrets.PROD_S3_BUCKET }}" --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.PROD_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text

      - name: Health check
        run: |
          echo "Production deployment complete"
          echo "URL: ${{ secrets.PROD_CLOUDFRONT_URL }}"

      - name: Notify status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            {
              echo "## Deploy Produção ✅"
              echo ""
              echo "Motivo: ${{ github.event.inputs.reason || 'Deploy automático (main)' }}"
              echo ""
              echo "Branch: \`main\`"
              echo "Commit: ${{ github.sha }}"
              echo "URL: ${{ secrets.PROD_CLOUDFRONT_URL }}"
            } >> $GITHUB_STEP_SUMMARY
          else
            {
              echo "## Deploy Produção ❌"
              echo ""
              echo "Falha no deploy para produção."
              echo ""
              echo "Branch: \`main\`"
              echo "Commit: ${{ github.sha }}"
            } >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
